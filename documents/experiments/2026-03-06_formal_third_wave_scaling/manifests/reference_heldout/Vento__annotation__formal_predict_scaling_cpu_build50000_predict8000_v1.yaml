dataset_name: Vento
version: 1
protocol_version: 1
random_seed: 2026
split_name: formal_predict_scaling_cpu_build50000_predict8000_v1
split_description: formal third-wave predict scaling manifest (cpu); fixed build=50000,
  query=8000, panel=supplementary
reference_subset: reference_train_50000_prepared
query_subset: heldout_predict_8000_prepared
reference_h5ad: /tmp/atlasmtl_benchmarks/2026-03-06/formal_third_wave/Vento/prepared/formal_split_v1/build_scaling/build_50000/reference_train_50000.h5ad
query_h5ad: /tmp/atlasmtl_benchmarks/2026-03-06/formal_third_wave/Vento/prepared/formal_split_v1/predict_scaling/fixed_build_50000/heldout_predict_8000.h5ad
label_columns:
- annotation
domain_key: orig.ident
input_matrix_type: counts
counts_layer: counts
method_configs:
  celltypist:
    target_label_column: annotation
    trainer_backend: formal
    trainer_config:
      n_jobs: 8
      feature_selection: true
      balance_cell_type: true
      batch_size: 5000
      top_genes: 500
      use_gpu: false
  singler:
    target_label_column: annotation
    reference_layer: counts
    query_layer: counts
    normalize_log1p: true
    use_pruned_labels: true
  symphony:
    target_label_column: annotation
    batch_key: orig.ident
    reference_layer: counts
    query_layer: counts
  seurat_anchor_transfer:
    target_label_column: annotation
    batch_key: orig.ident
    reference_layer: counts
    query_layer: counts
    nfeatures: 3000
  reference_knn:
    input_transform: binary
train:
  hidden_sizes:
  - 256
  - 128
  dropout_rate: 0.2
  batch_size: 128
  num_epochs: 50
  learning_rate: 0.0003
  input_transform: binary
  val_fraction: 0.1
  early_stopping_patience: 5
  random_state: 2026
  reference_storage: external
predict:
  knn_correction: 'off'
  batch_size: 128
  input_transform: binary
