dataset_name: Vento
version: 1
protocol_version: 1
random_seed: 2026
split_name: formal_build_scaling_gpu_build10000_eval10k_v1
split_description: formal third-wave build scaling manifest (gpu); build=10000, fixed
  query=10k, panel=supplementary
reference_subset: reference_train_10000_prepared
query_subset: heldout_build_eval_10k_prepared
reference_h5ad: /tmp/atlasmtl_benchmarks/2026-03-06/formal_third_wave/Vento/prepared/formal_split_v1/build_scaling/build_10000/reference_train_10000.h5ad
query_h5ad: /tmp/atlasmtl_benchmarks/2026-03-06/formal_third_wave/Vento/prepared/formal_split_v1/build_scaling/build_10000/heldout_build_eval_10k.h5ad
label_columns:
- annotation
domain_key: orig.ident
input_matrix_type: counts
counts_layer: counts
method_configs:
  celltypist:
    target_label_column: annotation
    trainer_backend: formal
    trainer_config:
      n_jobs: 8
      feature_selection: true
      balance_cell_type: true
      batch_size: 5000
      top_genes: 500
      use_gpu: false
  singler:
    target_label_column: annotation
    reference_layer: counts
    query_layer: counts
    normalize_log1p: true
    use_pruned_labels: true
  symphony:
    target_label_column: annotation
    batch_key: orig.ident
    reference_layer: counts
    query_layer: counts
  seurat_anchor_transfer:
    target_label_column: annotation
    batch_key: orig.ident
    reference_layer: counts
    query_layer: counts
    nfeatures: 3000
  reference_knn:
    input_transform: binary
  scanvi:
    target_label_column: annotation
    batch_key: orig.ident
    counts_layer: counts
    scvi_max_epochs: 25
    scanvi_max_epochs: 25
    query_max_epochs: 20
    n_latent: 20
    batch_size: 256
    datasplitter_num_workers: 0
    use_gpu: true
train:
  hidden_sizes:
  - 1024
  - 512
  dropout_rate: 0.2
  batch_size: 512
  num_epochs: 50
  learning_rate: 0.001
  input_transform: binary
  val_fraction: 0.1
  early_stopping_patience: 5
  random_state: 2026
  reference_storage: external
predict:
  knn_correction: 'off'
  batch_size: 512
  input_transform: binary
