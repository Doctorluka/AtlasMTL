dataset_name: DISCO_hPBMCs
version: 1
protocol_version: 1
random_seed: 2026
split_name: formal_predict_scaling_gpu_build100000_predict5000_v1
split_description: formal third-wave predict scaling manifest (gpu); fixed build=100000,
  query=5000, panel=main
reference_subset: reference_train_100000_prepared
query_subset: heldout_predict_5000_prepared
reference_h5ad: /tmp/atlasmtl_benchmarks/2026-03-06/formal_third_wave/DISCO_hPBMCs/prepared/formal_split_v1/build_scaling/build_100000/reference_train_100000.h5ad
query_h5ad: /tmp/atlasmtl_benchmarks/2026-03-06/formal_third_wave/DISCO_hPBMCs/prepared/formal_split_v1/predict_scaling/fixed_build_100000/heldout_predict_5000.h5ad
label_columns:
- cell_subtype
domain_key: sample
input_matrix_type: counts
counts_layer: counts
method_configs:
  celltypist:
    target_label_column: cell_subtype
    trainer_backend: formal
    trainer_config:
      n_jobs: 8
      feature_selection: true
      balance_cell_type: true
      batch_size: 5000
      top_genes: 500
      use_gpu: false
  singler:
    target_label_column: cell_subtype
    reference_layer: counts
    query_layer: counts
    normalize_log1p: true
    use_pruned_labels: true
  symphony:
    target_label_column: cell_subtype
    batch_key: sample
    reference_layer: counts
    query_layer: counts
  seurat_anchor_transfer:
    target_label_column: cell_subtype
    batch_key: sample
    reference_layer: counts
    query_layer: counts
    nfeatures: 3000
  reference_knn:
    input_transform: binary
  scanvi:
    target_label_column: cell_subtype
    batch_key: sample
    counts_layer: counts
    scvi_max_epochs: 25
    scanvi_max_epochs: 25
    query_max_epochs: 20
    n_latent: 20
    batch_size: 256
    datasplitter_num_workers: 0
    use_gpu: true
train:
  hidden_sizes:
  - 1024
  - 512
  dropout_rate: 0.2
  batch_size: 512
  num_epochs: 50
  learning_rate: 0.001
  input_transform: binary
  val_fraction: 0.1
  early_stopping_patience: 5
  random_state: 2026
  reference_storage: external
predict:
  knn_correction: 'off'
  batch_size: 512
  input_transform: binary
