dataset_name: DISCO_hPBMCs
version: 1
protocol_version: 1
random_seed: 2026
split_name: group_split_v1_train5k_test1k
split_description: >
  Draft reference_heldout manifest for the DISCO ProjectSVR pilot. Use a
  group-aware split on obs["sample"], then materialize train/validation/test
  subsets before execution. First-wave build/predict sizes are 5k/1k. This
  draft targets cell_subtype and validates the count-like adata.X path where
  no layers["counts"] is provided upstream.
reference_subset: train_5k_draft
query_subset: heldout_test_1k_draft
reference_h5ad: /home/data/fhz/tmp/atlasmtl_benchmarks/2026-03-03/reference_heldout/DISCO_hPBMCs/prepared/group_split_v1_train5k_test1k/reference_train.h5ad
query_h5ad: /home/data/fhz/tmp/atlasmtl_benchmarks/2026-03-03/reference_heldout/DISCO_hPBMCs/prepared/group_split_v1_train5k_test1k/heldout_test.h5ad
label_columns:
  - cell_subtype
domain_key: sample
var_names_type: symbol
species: human
input_matrix_type: counts
counts_layer: counts
feature_space: hvg
hvg_config:
  method: seurat_v3
  n_top_genes: 3000
preprocess:
  enabled: true
  config:
    var_names_type: symbol
    species: human
    input_matrix_type: counts
    counts_layer: counts
    feature_space: hvg
    hvg_method: seurat_v3
    n_top_genes: 3000
method_configs:
  celltypist:
    target_label_column: cell_subtype
  scanvi:
    target_label_column: cell_subtype
    batch_key: sample
  singler:
    target_label_column: cell_subtype
    reference_layer: counts
    query_layer: counts
    normalize_log1p: true
    use_pruned_labels: true
  symphony:
    target_label_column: cell_subtype
    batch_key: sample
    reference_layer: counts
    query_layer: counts
  seurat_anchor_transfer:
    target_label_column: cell_subtype
    batch_key: sample
    reference_layer: counts
    query_layer: counts
    nfeatures: 3000
  reference_knn:
    input_transform: binary
train:
  hidden_sizes: [256, 128]
  dropout_rate: 0.2
  batch_size: 256
  num_epochs: 8
  learning_rate: 0.001
  input_transform: binary
  val_fraction: 0.1
  early_stopping_patience: 3
  random_state: 2026
  reference_storage: external
