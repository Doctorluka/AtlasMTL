dataset_name: sampled_real_mapping_20260301
version: 1
protocol_version: 1
random_seed: 2026
split_name: sampled_real_mapping_split
split_description: sampled reference/query benchmark on real atlasmtl test adatas
reference_subset: sampled_adata_10k
