dataset_name: real_mapping_ablation
version: 1
protocol_version: 1
reference_h5ad: data/test_adatas/sampled_adata_10k.h5ad
query_h5ad: data/test_adatas/sampled_adata_3000.h5ad
label_columns:
  - anno_lv1
  - anno_lv2
  - anno_lv3
  - anno_lv4
var_names_type: symbol
species: human
input_matrix_type: lognorm
counts_layer: counts
feature_space: whole
duplicate_policy: sum
unmapped_policy: drop
train:
  hidden_sizes: [256, 128]
  dropout_rate: 0.3
  batch_size: 256
  num_epochs: 8
  learning_rate: 0.001
  input_transform: binary
  random_state: 42
  reference_storage: external
predict:
  knn_correction: off
  enforce_hierarchy: true
  batch_size: 256
method_configs:
  atlasmtl:
    reference_layer: counts
    query_layer: counts
