dataset_name: HLCA_Core
version: 1
protocol_version: 1
random_seed: 2026
split_name: formal_train10k_test5k_gpu_group_v1
split_description: formal third-wave HLCA run with 10k train and 5k heldout (GPU group)
reference_subset: train_10k_prepared
query_subset: heldout_test_5k_prepared
reference_h5ad: /tmp/atlasmtl_benchmarks/2026-03-05/reference_heldout/HLCA_Core/prepared/formal_train10k_test5k/reference_train_10k.h5ad
query_h5ad: /tmp/atlasmtl_benchmarks/2026-03-05/reference_heldout/HLCA_Core/prepared/formal_train10k_test5k/heldout_test_5k.h5ad
label_columns:
  - ann_level_5
domain_key: donor_id
input_matrix_type: lognorm
counts_layer: counts
method_configs:
  scanvi:
    target_label_column: ann_level_5
    batch_key: donor_id
  reference_knn:
    input_transform: binary
train:
  hidden_sizes: [256, 128]
  dropout_rate: 0.2
  batch_size: 256
  num_epochs: 8
  learning_rate: 0.001
  input_transform: binary
  val_fraction: 0.1
  early_stopping_patience: 3
  random_state: 2026
  reference_storage: external
predict:
  knn_correction: "off"
  batch_size: 256
  input_transform: binary
